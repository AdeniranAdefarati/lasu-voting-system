<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>LASU Voting System - Results</title>
  <link rel="stylesheet" href="style.css">

<body>

  <div class="main-container">

    <div class="result-card">

    </div>

    <div class="result-card">
      <h2>Fatanmi Adeniran</h2>
      <p id="resultC">Votes: 0</p>

      <div class="progress-box">
        <div id="barC" class="progress-bar"></div>
      </div>

    </div>

    <h2 id="winnerText"></h2>

    <button onclick="resetElection()" class="danger-btn">

    </button>

    <br><br>

    <a href="index.html">Back to Login</a>

  </div>

  <script src="script.js"></script>

</html>
