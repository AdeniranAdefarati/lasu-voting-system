<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lagos state university Voting System - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-container">

        <div class="header">
            <img src="lasu logo.png" class="lasu-logo">

            <h1>Lagos State University Voting System</h1>

            <p class="school-name">
                Student Election Portal
            </p>
        </div>

        <p>Student Login</p>

        <input 
            type="text" 
            id="loginMatric" 
            placeholder="Enter Matric Number"
        >

        <input 
            type="password" 
            id="loginPassword" 
            placeholder="Enter Password"
        >

        <button onclick="loginUser()">
            Login
        </button>

        <p>
            Don't have an account?
            <a href="register.html">Register</a>
        </p>

        <p>
            <a href="admin-login.html">Admin Result Page</a>
        </p>

    </div>

    <script src="script.js"></script>

</body>
</html>
