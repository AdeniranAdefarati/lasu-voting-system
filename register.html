<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lagos state university Voting System - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <img src="images/lasu logo.png" class="lasu-logo">
        <h1>Register</h1>
        <p>Create student voting account</p>

        <input type="text" id="fullName" placeholder="Full Name">
        <input type="text" id="matricNumber" placeholder="Matric Number">
        <input type="password" id="password" placeholder="Password">

        <button onclick="registerUser()">Register</button>

        <p>Already registered? <a href="index.html">Login</a></p>
    </div>

  <script src="script.js"></script>
</body>
</html>
